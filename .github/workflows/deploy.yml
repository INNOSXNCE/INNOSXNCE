name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch: {}
  # To redeploy/roll back to an older commit, use "Run workflow" and pick
  # that commit's SHA/tag as the ref — no separate rollback input needed.

permissions:
  contents: read

concurrency:
  group: deploy-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  deploy-production:
    name: Deploy to production
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Gated by the "production" GitHub Environment: requires a human reviewer
    # to approve the run before the job (and its secrets) are released.
    # CI correctness is gated separately, upstream, by branch protection
    # requiring ci.yml and codeql.yml to pass before a PR can merge to main.
    environment: production
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22

      # ── DEPLOY TARGET: VERCEL — replace only this block to move to Railway/AWS ──
      # Sequence per Vercel CLI docs (vercel.com/docs/cli/deploying-from-cli,
      # vercel.com/docs/cli/pull, vercel.com/docs/cli/deploy): pull project
      # settings/env for the target environment, then let `vercel build` do its
      # own isolated install+build, then upload the prebuilt output. Secrets are
      # declared per-step so no other step in this job (or ci.yml) can read them.
      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel project settings
        run: vercel pull --yes --environment=production
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build (prebuilt output)
        run: vercel build --prod

      - name: Deploy prebuilt output
        run: vercel deploy --prebuilt --prod
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      # ── END DEPLOY TARGET: VERCEL ──
