name: Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}
  # To redeploy/roll back to an older commit, use "Run workflow" and pick
  # that commit's SHA/tag as the ref — no separate rollback input needed.

permissions:
  contents: read

concurrency:
  group: deploy-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # ── PREVIEW: one throwaway deploy per PR commit, posted back on the PR ──
  # Runs on pull_request only. Skipped for fork PRs so their untrusted code
  # can never read the deploy secrets. Also skipped for Dependabot PRs, which
  # GitHub runs without access to secrets — the Vercel step would always fail
  # on empty credentials, so we don't attempt a preview for them. No approval
  # gate — previews are meant to be fast so you can eyeball the change first.
  deploy-preview:
    name: Deploy preview
    if: >-
      github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: preview
    permissions:
      contents: read
      pull-requests: write # to comment the preview URL on the PR
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22

      # Same Vercel CLI sequence as production, minus every --prod flag, so
      # this pulls the "preview" env and produces a preview (not live) deploy.
      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel project settings
        run: vercel pull --yes --environment=preview
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build (prebuilt output)
        run: vercel build

      - name: Deploy prebuilt output
        id: deploy
        run: echo "url=$(vercel deploy --prebuilt)" >> "$GITHUB_OUTPUT"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      - name: Comment preview URL on the PR
        env:
          GH_TOKEN: ${{ github.token }}
          PREVIEW_URL: ${{ steps.deploy.outputs.url }}
        run: |
          gh pr comment "${{ github.event.pull_request.number }}" \
            --body "🔎 **Preview deployed** for \`${{ github.sha }}\`: ${PREVIEW_URL}"

  # ── PRODUCTION: live deploy on merge to main (never on PRs). ──
  # Gated by the "production" GitHub Environment: requires a human reviewer to
  # approve before the job (and its secrets) are released — this is the second,
  # explicit "promote to prod" gate that fires after you merge.
  # CI correctness is gated separately, upstream, by branch protection
  # requiring ci.yml and codeql.yml to pass before a PR can merge to main.
  deploy-production:
    name: Deploy to production
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22

      # ── DEPLOY TARGET: VERCEL — replace only this block to move to Railway/AWS ──
      # Sequence per Vercel CLI docs (vercel.com/docs/cli/deploying-from-cli,
      # vercel.com/docs/cli/pull, vercel.com/docs/cli/deploy): pull project
      # settings/env for the target environment, then let `vercel build` do its
      # own isolated install+build, then upload the prebuilt output. Secrets are
      # declared per-step so no other step in this job (or ci.yml) can read them.
      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel project settings
        run: vercel pull --yes --environment=production
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build (prebuilt output)
        run: vercel build --prod

      - name: Deploy prebuilt output
        run: vercel deploy --prebuilt --prod
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      # ── END DEPLOY TARGET: VERCEL ──
